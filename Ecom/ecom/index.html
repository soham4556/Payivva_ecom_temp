<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" id="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function() {
      // Check if user is requesting Desktop Site (common on Chrome Android/iOS)
      // Usually "Desktop Site" mode removes 'Mobile' from UserAgent or uses a high resolution
      const isDesktopMode = !navigator.userAgent.includes('Mobile') || window.innerWidth > 900;
      const viewport = document.getElementById('viewport');
      if (isDesktopMode) {
        viewport.setAttribute('content', 'width=1200');
      }
    })();
  </script>
  <meta name="description"
    content="Payivva Technologies - Multi-Vendor eCommerce Marketplace. Browse thousands of products from trusted vendors." />
  <meta name="keywords" content="ecommerce, marketplace, multi-vendor, online shopping, Payivva" />
  <meta name="author" content="Payivva Technologies" />
  <meta name="robots" content="index, follow" />
  <title>Payivva - Multi-Vendor Marketplace</title>
</head>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
